spring:
  datasource:
    url: jdbc:h2:mem:navbi;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: ''
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      data-locations: classpath:data-local.sql
  data:
    redis:
      host: localhost
      port: 6379
